<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Dungeon Crawler</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  background: #000; overflow: hidden; touch-action: none;
  height: 100%; height: 100dvh;
  /* safe-area insets for notched phones */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  padding: 0; /* canvas fills viewport; insets applied per-element below */
}
canvas { display: block; width: 100% !important; height: 100% !important; }

#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  /* respect notch at top */
  padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
  pointer-events: none;
  font-family: monospace;
  font-size: clamp(14px, 4vw, 20px);
  color: #fff;
  text-shadow: 0 0 8px #000;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  z-index: 10;
}
#health-bar-wrap { display: flex; align-items: center; gap: 8px; }
#health-bar {
  width: clamp(80px, 20vw, 160px); height: clamp(10px, 2.5vw, 16px);
  background: #300; border: 2px solid #c33; border-radius: 4px; overflow: hidden;
}
#health-fill { height: 100%; background: #e44; transition: width 0.1s; }
#score { font-size: clamp(14px, 4.5vw, 22px); color: #ffd700; }
#wave-label { font-size: clamp(12px, 3.5vw, 18px); color: #aaddff; }

/* ── Joystick ── */
#joystick-zone {
  position: fixed;
  bottom: max(40px, env(safe-area-inset-bottom, 0px) + 28px);
  left: max(40px, env(safe-area-inset-left, 0px) + 20px);
  width: clamp(130px, 22vw, 180px); height: clamp(130px, 22vw, 180px);
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.22);
  border-radius: 50%; pointer-events: none;
  touch-action: none;
  /* subtle pulse to hint it's interactive */
  animation: joyPulse 2.4s ease-in-out 1s 3;
  z-index: 10;
}
@keyframes joyPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  50%      { box-shadow: 0 0 0 8px rgba(255,255,255,0.10); }
}
#joystick-knob {
  position: absolute;
  width: clamp(48px, 9vw, 64px); height: clamp(48px, 9vw, 64px);
  background: rgba(255,255,255,0.32);
  border: 2px solid rgba(255,255,255,0.60);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* ── Touch hint overlay ── */
#touch-hint {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center;
  padding: 0 0 max(18px, env(safe-area-inset-bottom, 0px) + 8px);
  font-family: monospace; font-size: clamp(11px, 3vw, 14px);
  color: rgba(255,255,255,0.45);
  pointer-events: none; user-select: none;
  transition: opacity 1s;
  z-index: 10;
}

/* ── Game-over panel ── */
#game-over {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  flex-direction: column; align-items: center; justify-content: center;
  font-family: monospace; color: #fff;
  /* inset-safe padding so content isn't behind notch/home bar */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  z-index: 20;
}
#game-over h1 { font-size: clamp(36px, 10vw, 60px); color: #e44; margin-bottom: 14px; letter-spacing: 4px; }
#game-over p  { font-size: clamp(18px, 5vw, 26px); margin-bottom: 10px; }
#game-over .sub { font-size: clamp(13px, 3.5vw, 17px); color: #aaa; margin-bottom: 32px; }
#game-over button {
  /* minimum 44×44 px touch target per Apple/Material guidelines */
  min-height: 52px; min-width: 160px;
  padding: 14px 40px; font-size: clamp(16px, 4.5vw, 22px); font-family: monospace;
  background: #900; color: #fff; border: 2px solid #e44;
  border-radius: 8px; cursor: pointer; letter-spacing: 2px;
  -webkit-tap-highlight-color: transparent;
}
#game-over button:active { background: #b00; }
</style>
</head>
<body>

<div id="hud">
  <div id="health-bar-wrap">
    ❤ <div id="health-bar"><div id="health-fill"></div></div>
  </div>
  <div id="wave-label">Wave 1</div>
  <div id="score">Score: 0</div>
</div>

<div id="joystick-zone"><div id="joystick-knob"></div></div>
<div id="touch-hint">drag left side to move &nbsp;·&nbsp; sword swings automatically</div>

<div id="game-over">
  <h1>YOU DIED</h1>
  <p id="final-score">Score: 0</p>
  <div class="sub" id="final-wave">Survived to wave 1</div>
  <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";

// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const TILE          = 2;       // world units per tile
const COLS          = 29;
const ROWS          = 29;
const PLAYER_SPEED  = 6.5;     // units / sec
const PLAYER_RADIUS = 0.52;
const PLAYER_MAX_HP = 10;

const SWORD_RANGE     = 3.6;
const SWORD_ARC       = Math.PI * (2/3);   // 120 °
const SWORD_COOLDOWN  = 0.72;              // sec between swings
const SWORD_SWEEP_DUR = 0.30;              // sweep animation duration
const SWORD_SEGMENTS  = 18;

const ENEMY_RADIUS      = 0.48;
const ENEMY_MAX_HP      = 2;
const ENEMY_DAMAGE      = 1;
const ENEMY_DAMAGE_CD   = 0.75;
const ENEMY_SPEED_BASE  = 2.8;
const ENEMY_SPEED_SCALE = 0.08;  // per wave

const VIEW_HALF = 18;   // orthographic half-height
const WALL_H    = 3;    // wall height for 3D rendering
const CAM_BACK  = 8;    // camera Y offset behind view centre (creates tilt)
const CAM_HIGH  = 28;   // camera height above world plane

// ═══════════════════════════════════════════════════════════════
//  DUNGEON GENERATION  (recursive-backtracker maze, then widen)
// ═══════════════════════════════════════════════════════════════
function buildMap(cols, rows) {
  const map = Array.from({length: rows}, () => new Uint8Array(cols).fill(1));

  function carve(x, y) {
    map[y][x] = 0;
    const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
    for (const [dx, dy] of dirs) {
      const nx = x + dx, ny = y + dy;
      if (nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1 && map[ny][nx] === 1) {
        map[y + dy/2][x + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  carve(1, 1);

  // Randomly widen some corridors so movement feels less cramped
  for (let y = 1; y < rows-1; y++) {
    for (let x = 1; x < cols-1; x++) {
      if (map[y][x] === 0 && Math.random() < 0.28) {
        const ox = x + (Math.random() < 0.5 ? 1 : -1);
        const oy = y + (Math.random() < 0.5 ? 1 : -1);
        if (ox > 0 && ox < cols-1 && oy > 0 && oy < rows-1) map[oy][ox] = 0;
      }
    }
  }
  return map;
}

const MAP = buildMap(COLS, ROWS);

function tileToWorld(col, row) {
  return { x: (col - COLS / 2) * TILE, y: (row - ROWS / 2) * TILE };
}

// Collect all floor tile positions (used for enemy spawning)
const FLOOR_TILES = [];
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    if (MAP[r][c] === 0) FLOOR_TILES.push(tileToWorld(c, r));
  }
}

// Cheap wall test — treats map boundary as wall
function isWallAt(wx, wy) {
  const col = Math.round(wx / TILE + COLS / 2);
  const row = Math.round(wy / TILE + ROWS / 2);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
  return MAP[row][col] === 1;
}

// Radius-aware wall test — checks 4 cardinal edge points of a circle
function isCircleWallAt(cx, cy, r) {
  return isWallAt(cx + r, cy) || isWallAt(cx - r, cy) ||
         isWallAt(cx, cy + r) || isWallAt(cx, cy - r);
}

// ═══════════════════════════════════════════════════════════════
//  PATHFINDING  (BFS flow field from player tile)
// ═══════════════════════════════════════════════════════════════
// flowField maps tile key (row*COLS+col) → {dx,dy} tile-space direction toward player
const flowField = new Map();
let _fpLastCol = -1, _fpLastRow = -1;

function worldToTile(wx, wy) {
  return {
    col: Math.round(wx / TILE + COLS / 2),
    row: Math.round(wy / TILE + ROWS / 2)
  };
}

// BFS outward from player tile; each reachable tile stores a unit step toward player.
function buildFlowField(px, py) {
  const { col: sc, row: sr } = worldToTile(px, py);
  flowField.clear();

  const queue = [[sc, sr]];
  const visited = new Set([sr * COLS + sc]);

  while (queue.length) {
    const [c, r] = queue.shift();
    for (const [dc, dr] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nc = c + dc, nr = r + dr;
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
      if (MAP[nr][nc] === 1) continue;
      const key = nr * COLS + nc;
      if (visited.has(key)) continue;
      visited.add(key);
      // Direction from (nc,nr) → (c,r): one step closer to player
      flowField.set(key, { dx: c - nc, dy: r - nr });
      queue.push([nc, nr]);
    }
  }

  _fpLastCol = sc;
  _fpLastRow = sr;
}

// Returns normalised world-space move direction for a world position, or null.
function getFlowDir(wx, wy) {
  const { col, row } = worldToTile(wx, wy);
  return flowField.get(row * COLS + col) || null;
}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const aspect = innerWidth / innerHeight;
const camera = new THREE.OrthographicCamera(
  -VIEW_HALF * aspect, VIEW_HALF * aspect,
   VIEW_HALF,         -VIEW_HALF,
  0.1, 500
);
camera.position.set(0, -CAM_BACK, CAM_HIGH);
camera.lookAt(0, 0, 0);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080808);

// ── Lighting ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x7080b0, 0.65));
const sunLight = new THREE.DirectionalLight(0xfff0d0, 1.1);
sunLight.position.set(6, -10, 20);
scene.add(sunLight);
const fillLight = new THREE.DirectionalLight(0x2030a0, 0.35);
fillLight.position.set(-8, 14, 6);
scene.add(fillLight);

// ── Floor ──────────────────────────────────────────────────────
{
  const g = new THREE.PlaneGeometry(COLS * TILE, ROWS * TILE);
  const m = new THREE.MeshLambertMaterial({ color: 0x1a1208 });
  scene.add(new THREE.Mesh(g, m));
}

// ── Floor tile grid (subtle) ───────────────────────────────────
{
  const g = new THREE.PlaneGeometry(TILE * 0.96, TILE * 0.96);
  const m = new THREE.MeshLambertMaterial({ color: 0x201610 });
  const floors = FLOOR_TILES.length;
  const inst  = new THREE.InstancedMesh(g, m, floors);
  const dummy = new THREE.Object3D();
  FLOOR_TILES.forEach(({x, y}, i) => {
    dummy.position.set(x, y, 0.005);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
  });
  inst.instanceMatrix.needsUpdate = true;
  scene.add(inst);
}

// ── Walls — instanced 3D boxes ────────────────────────────────
{
  const wallPos = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (MAP[r][c] === 1) {
        const { x, y } = tileToWorld(c, r);
        wallPos.push(x, y);
      }
    }
  }
  const count = wallPos.length / 2;
  const dummy = new THREE.Object3D();

  // 3D stone wall blocks
  const wg = new THREE.BoxGeometry(TILE, TILE, WALL_H);
  const wm = new THREE.MeshLambertMaterial({ color: 0x5a4028 });
  const walls = new THREE.InstancedMesh(wg, wm, count);
  for (let i = 0; i < count; i++) {
    dummy.position.set(wallPos[i*2], wallPos[i*2+1], WALL_H / 2);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    walls.setMatrixAt(i, dummy.matrix);
  }
  walls.instanceMatrix.needsUpdate = true;
  scene.add(walls);

  // Cap layer on wall tops (slightly darker)
  const wg2 = new THREE.BoxGeometry(TILE, TILE, 0.08);
  const wm2 = new THREE.MeshLambertMaterial({ color: 0x3a2818 });
  const wallTops = new THREE.InstancedMesh(wg2, wm2, count);
  for (let i = 0; i < count; i++) {
    dummy.position.set(wallPos[i*2], wallPos[i*2+1], WALL_H + 0.04);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    wallTops.setMatrixAt(i, dummy.matrix);
  }
  wallTops.instanceMatrix.needsUpdate = true;
  scene.add(wallTops);
}

// ═══════════════════════════════════════════════════════════════
//  PLAYER MESH  (3D capsule: hemisphere + cylinder + hemisphere)
// ═══════════════════════════════════════════════════════════════
const P_CYL_H = 0.4;  // height of the cylinder section
const _pMat = new THREE.MeshLambertMaterial({ color: 0x44aaff });

// playerBody is a Group so position.set() moves the whole capsule
const playerBody = new THREE.Group();

// Cylinder body
const _pCylGeo = new THREE.CylinderGeometry(PLAYER_RADIUS, PLAYER_RADIUS, P_CYL_H, 18);
_pCylGeo.rotateX(Math.PI / 2); // Z is now the capsule axis
const _pCyl = new THREE.Mesh(_pCylGeo, _pMat);
_pCyl.position.z = PLAYER_RADIUS + P_CYL_H / 2; // cylinder centre in group space
playerBody.add(_pCyl);

// Top hemisphere (dome toward +Z)
const _pTopGeo = new THREE.SphereGeometry(PLAYER_RADIUS, 18, 8, 0, Math.PI * 2, 0, Math.PI / 2);
_pTopGeo.rotateX(Math.PI / 2);
const _pTop = new THREE.Mesh(_pTopGeo, _pMat);
_pTop.position.z = PLAYER_RADIUS + P_CYL_H; // sits at top edge of cylinder
playerBody.add(_pTop);

// Bottom hemisphere (dome toward -Z)
const _pBotGeo = new THREE.SphereGeometry(PLAYER_RADIUS, 18, 8, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
_pBotGeo.rotateX(Math.PI / 2);
const _pBot = new THREE.Mesh(_pBotGeo, _pMat);
_pBot.position.z = PLAYER_RADIUS; // sits at bottom edge of cylinder
playerBody.add(_pBot);

scene.add(playerBody);

// Facing indicator — small sphere above the capsule top
const facingDot = new THREE.Mesh(
  new THREE.SphereGeometry(0.14, 8, 6),
  new THREE.MeshLambertMaterial({ color: 0xffffff })
);
facingDot.position.z = PLAYER_RADIUS * 2 + P_CYL_H + 0.1; // above top cap
scene.add(facingDot);

// ═══════════════════════════════════════════════════════════════
//  SWORD ARC  (rebuilt each frame during sweep)
// ═══════════════════════════════════════════════════════════════
const swordMat = new THREE.MeshBasicMaterial({  // basic — always glows regardless of light
  color: 0xffdd44,
  transparent: true,
  opacity: 0.8,
  side: THREE.DoubleSide
});
let swordMesh = null;

function buildSectorGeo(radius, arcAngle, segs) {
  const verts = [0, 0, 0];
  for (let i = 0; i <= segs; i++) {
    const a = -arcAngle / 2 + arcAngle * i / segs;
    verts.push(Math.cos(a) * radius, Math.sin(a) * radius, 0);
  }
  const idx = [];
  for (let i = 1; i <= segs; i++) idx.push(0, i, i + 1);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  return geo;
}

function showSwordArc(px, py, facing, progress) {
  if (swordMesh) { scene.remove(swordMesh); swordMesh.geometry.dispose(); swordMesh = null; }
  const geo = buildSectorGeo(SWORD_RANGE, SWORD_ARC, SWORD_SEGMENTS);
  const mat = swordMat.clone();
  mat.opacity = 0.8 * (1 - progress * 0.6);
  swordMesh = new THREE.Mesh(geo, mat);
  swordMesh.position.set(px, py, 0.06);
  swordMesh.rotation.z = facing;
  scene.add(swordMesh);
}

function hideSwordArc() {
  if (swordMesh) { scene.remove(swordMesh); swordMesh.geometry.dispose(); swordMesh = null; }
}

// ═══════════════════════════════════════════════════════════════
//  ENEMY CLASS
// ═══════════════════════════════════════════════════════════════
const E_CYL_H = 0.35; // height of the cylinder section for enemy capsule
const _enemyMat  = new THREE.MeshLambertMaterial({ color: 0xff3333 });

function _makeEnemyCapsule() {
  const group = new THREE.Group();
  const mat = _enemyMat.clone();
  // Cylinder body
  const cg = new THREE.CylinderGeometry(ENEMY_RADIUS, ENEMY_RADIUS, E_CYL_H, 12);
  cg.rotateX(Math.PI / 2);
  const cyl = new THREE.Mesh(cg, mat);
  cyl.position.z = ENEMY_RADIUS + E_CYL_H / 2;
  group.add(cyl);
  // Top hemisphere (dome toward +Z)
  const tg = new THREE.SphereGeometry(ENEMY_RADIUS, 12, 7, 0, Math.PI * 2, 0, Math.PI / 2);
  tg.rotateX(Math.PI / 2);
  const top = new THREE.Mesh(tg, mat);
  top.position.z = ENEMY_RADIUS + E_CYL_H;
  group.add(top);
  // Bottom hemisphere (dome toward -Z)
  const bg = new THREE.SphereGeometry(ENEMY_RADIUS, 12, 7, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
  bg.rotateX(Math.PI / 2);
  const bot = new THREE.Mesh(bg, mat);
  bot.position.z = ENEMY_RADIUS;
  group.add(bot);
  return group;
}
const _hpBgMat   = new THREE.MeshBasicMaterial({ color: 0x330000 });
const _hpFillMat = new THREE.MeshBasicMaterial({ color: 0x22ee44 });

class Enemy {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.hp = ENEMY_MAX_HP;
    this.damageCooldown = 0;
    this.dead = false;

    this.body = _makeEnemyCapsule();
    scene.add(this.body);

    this.hpBg = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 0.13), _hpBgMat.clone());
    this.hpBg.position.z = 1.5;
    scene.add(this.hpBg);

    this.hpBar = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 0.13), _hpFillMat.clone());
    this.hpBar.position.z = 1.55;
    scene.add(this.hpBar);
  }

  update(dt, px, py, speed) {
    if (this.dead) return;

    // Flow-field pathfinding; fall back to direct chase if tile has no entry
    const flow = getFlowDir(this.x, this.y);
    let mdx, mdy;
    if (flow) {
      mdx = flow.dx; mdy = flow.dy;
    } else {
      const d = Math.hypot(px - this.x, py - this.y);
      mdx = d > 0.01 ? (px - this.x) / d : 0;
      mdy = d > 0.01 ? (py - this.y) / d : 0;
    }
    const mlen = Math.hypot(mdx, mdy);
    if (mlen > 0) {
      const vx = (mdx / mlen) * speed * dt;
      const vy = (mdy / mlen) * speed * dt;
      // Slide-axis collision (uses outer radius so enemies don't clip walls)
      if (!isCircleWallAt(this.x + vx, this.y, ENEMY_RADIUS))  this.x += vx;
      if (!isCircleWallAt(this.x, this.y + vy,  ENEMY_RADIUS))  this.y += vy;
    }

    // Sync meshes
    this.body.position.set(this.x, this.y, 0);
    this.hpBg.position.set(this.x, this.y + 0.65, 1.5);

    const frac = Math.max(0, this.hp / ENEMY_MAX_HP);
    this.hpBar.scale.x = frac;
    this.hpBar.position.set(this.x - (1 - frac) * 0.425, this.y + 0.65, 1.55);

    if (this.damageCooldown > 0) this.damageCooldown -= dt;
  }

  destroy() {
    this.dead = true;
    scene.remove(this.body);
    scene.remove(this.hpBg);
    scene.remove(this.hpBar);
    this.body.children.forEach(m => m.geometry.dispose());
  }
}

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
const startWorld = tileToWorld(1, 1);

const player = {
  x: startWorld.x,
  y: startWorld.y,
  hp: PLAYER_MAX_HP,
  facing: 0,           // radians; 0 = right
  swordCooldown: 0,
  sweeping: false,
  sweepTime: 0,
  hitSet: null,        // enemies hit this swing
};

let enemies   = [];
let wave      = 1;
let score     = 0;
let gameAlive = true;

// ═══════════════════════════════════════════════════════════════
//  WAVE MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function spawnWave(n) {
  const count = 3 + n * 2;
  const px = player.x, py = player.y;

  // Pick floor tiles that are far enough from the player
  const candidates = FLOOR_TILES.filter(t => Math.hypot(t.x - px, t.y - py) > 12);
  const pool = candidates.length > 0 ? candidates : FLOOR_TILES;

  for (let i = 0; i < count; i++) {
    const t = pool[Math.floor(Math.random() * pool.length)];
    enemies.push(new Enemy(t.x, t.y));
  }

  document.getElementById('wave-label').textContent = `Wave ${n}`;
}

// ═══════════════════════════════════════════════════════════════
//  TOUCH JOYSTICK
// ═══════════════════════════════════════════════════════════════
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');
const touchHint = document.getElementById('touch-hint');

// J_RADIUS mirrors half the CSS clamp(130px, 22vw, 180px)
function getJRadius() {
  return jZone.offsetWidth / 2;
}

let jActive = false, jTouchId = null, jOX = 0, jOY = 0;
let jVec = { x: 0, y: 0 };
let hintFaded = false;

function fadeHint() {
  if (!hintFaded) {
    hintFaded = true;
    touchHint.style.opacity = '0';
    setTimeout(() => { touchHint.style.display = 'none'; }, 1200);
  }
}

// Allow joystick touch to start anywhere on the left half of screen
document.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (!jActive && t.clientX < innerWidth * 0.5) {
      const r = getJRadius();
      jActive  = true;
      jTouchId = t.identifier;
      jOX = t.clientX;
      jOY = t.clientY;
      // Re-anchor zone visually under the finger
      jZone.style.left   = (jOX - r) + 'px';
      jZone.style.bottom = '';
      jZone.style.top    = (jOY - r) + 'px';
      fadeHint();
      e.preventDefault();
    }
  }
}, { passive: false });

document.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === jTouchId) {
      const J_RADIUS = getJRadius();
      let dx = t.clientX - jOX, dy = t.clientY - jOY;
      const len = Math.hypot(dx, dy);
      const cl  = Math.min(len, J_RADIUS);
      if (len > 0) { dx = dx/len*cl; dy = dy/len*cl; }
      jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      jVec.x =  dx / J_RADIUS;
      jVec.y = -dy / J_RADIUS;   // screen-Y inverted
      e.preventDefault();
    }
  }
}, { passive: false });

const resetJoystick = e => {
  for (const t of e.changedTouches) {
    if (t.identifier === jTouchId) {
      const r = getJRadius();
      jActive = false; jTouchId = null;
      jKnob.style.transform = 'translate(-50%, -50%)';
      jVec.x = 0; jVec.y = 0;
      // Return to default bottom-left position
      jZone.style.top    = '';
      jZone.style.bottom = `max(40px, calc(env(safe-area-inset-bottom, 0px) + 28px))`;
      jZone.style.left   = `max(40px, calc(env(safe-area-inset-left, 0px) + 20px))`;
    }
  }
};
document.addEventListener('touchend',    resetJoystick);
document.addEventListener('touchcancel', resetJoystick);

// ═══════════════════════════════════════════════════════════════
//  KEYBOARD INPUT
// ═══════════════════════════════════════════════════════════════
const keys = new Set();
document.addEventListener('keydown', e => keys.add(e.code));
document.addEventListener('keyup',   e => keys.delete(e.code));

function getKeyVec() {
  let x = 0, y = 0;
  if (keys.has('ArrowUp')    || keys.has('KeyW')) y += 1;
  if (keys.has('ArrowDown')  || keys.has('KeyS')) y -= 1;
  if (keys.has('ArrowLeft')  || keys.has('KeyA')) x -= 1;
  if (keys.has('ArrowRight') || keys.has('KeyD')) x += 1;
  const len = Math.hypot(x, y);
  if (len > 0) { x /= len; y /= len; }
  return { x, y };
}

// ═══════════════════════════════════════════════════════════════
//  SWORD HIT TEST
// ═══════════════════════════════════════════════════════════════
function enemyInArc(ex, ey) {
  const dx = ex - player.x, dy = ey - player.y;
  if (Math.hypot(dx, dy) > SWORD_RANGE) return false;
  let diff = Math.atan2(dy, dx) - player.facing;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  return Math.abs(diff) <= SWORD_ARC / 2;
}

// ═══════════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════════
const healthFill = document.getElementById('health-fill');
const scoreEl    = document.getElementById('score');

function updateHUD() {
  healthFill.style.width = Math.max(0, player.hp / PLAYER_MAX_HP * 100) + '%';
  scoreEl.textContent = `Score: ${score}`;
}

// ═══════════════════════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════════════════════
function triggerGameOver() {
  gameAlive = false;
  hideSwordArc();
  fadeHint();
  const el = document.getElementById('game-over');
  document.getElementById('final-score').textContent = `Score: ${score}`;
  document.getElementById('final-wave').textContent  = `Reached wave ${wave}`;
  el.style.display = 'flex';
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
let lastTs = null;

function loop(ts) {
  if (!gameAlive) return;
  requestAnimationFrame(loop);

  const dt = lastTs === null ? 0 : Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;

  // ── Input → movement direction ──────────────────────────────
  const mv = jActive ? jVec : getKeyVec();
  const moving = Math.hypot(mv.x, mv.y) > 0.02;

  if (moving) {
    // Update facing toward movement
    player.facing = Math.atan2(mv.y, mv.x);

    // Slide-axis collision (uses outer radius so player doesn't clip walls)
    const dx = mv.x * PLAYER_SPEED * dt;
    const dy = mv.y * PLAYER_SPEED * dt;
    if (!isCircleWallAt(player.x + dx, player.y, PLAYER_RADIUS))  player.x += dx;
    if (!isCircleWallAt(player.x, player.y + dy,  PLAYER_RADIUS))  player.y += dy;
  }

  // ── Face closest enemy in range (overrides walk direction) ───
  {
    let closestDist = SWORD_RANGE * 1.6;
    let closestEnemy = null;
    for (const e of enemies) {
      if (e.dead) continue;
      const d = Math.hypot(e.x - player.x, e.y - player.y);
      if (d < closestDist) { closestDist = d; closestEnemy = e; }
    }
    if (closestEnemy) {
      player.facing = Math.atan2(closestEnemy.y - player.y, closestEnemy.x - player.x);
    }
  }

  // ── Auto sword attack ────────────────────────────────────────
  if (player.swordCooldown > 0) player.swordCooldown -= dt;

  if (!player.sweeping && player.swordCooldown <= 0) {
    // Check if any enemy is in range to trigger swing
    const inRange = enemies.some(
      e => !e.dead && Math.hypot(e.x - player.x, e.y - player.y) < SWORD_RANGE * 1.6
    );
    if (inRange) {
      player.sweeping  = true;
      player.sweepTime = 0;
      player.hitSet    = new Set();
    }
  }

  if (player.sweeping) {
    player.sweepTime += dt;
    const progress = player.sweepTime / SWORD_SWEEP_DUR;

    if (progress >= 1) {
      player.sweeping       = false;
      player.swordCooldown  = SWORD_COOLDOWN;
      hideSwordArc();
    } else {
      showSwordArc(player.x, player.y, player.facing, progress);

      // Hit enemies inside arc (once per swing)
      for (const e of enemies) {
        if (!e.dead && !player.hitSet.has(e) && enemyInArc(e.x, e.y)) {
          e.hp -= 1;
          player.hitSet.add(e);
          if (e.hp <= 0) {
            e.destroy();
            score += 10 * wave;
          }
        }
      }
    }
  }

  // ── Enemy speed for this wave ────────────────────────────────
  const enemySpeed = ENEMY_SPEED_BASE + wave * ENEMY_SPEED_SCALE;

  // ── Rebuild flow field when player crosses a tile boundary ───
  { const { col, row } = worldToTile(player.x, player.y);
    if (col !== _fpLastCol || row !== _fpLastRow) buildFlowField(player.x, player.y); }

  // ── Update enemies ───────────────────────────────────────────
  for (const e of enemies) {
    if (e.dead) continue;
    e.update(dt, player.x, player.y, enemySpeed);

    // Contact damage to player
    if (e.damageCooldown <= 0 && Math.hypot(e.x - player.x, e.y - player.y) < PLAYER_RADIUS + ENEMY_RADIUS + 0.1) {
      player.hp -= ENEMY_DAMAGE;
      e.damageCooldown = ENEMY_DAMAGE_CD;
      if (player.hp <= 0) { triggerGameOver(); return; }
    }
  }

  // ── Cull dead enemies ────────────────────────────────────────
  enemies = enemies.filter(e => !e.dead);

  // ── Wave cleared? ────────────────────────────────────────────
  if (enemies.length === 0) {
    wave += 1;
    spawnWave(wave);
  }

  // ── Camera follows player (slight tilt for 3D depth) ─────────
  camera.position.set(player.x, player.y - CAM_BACK, CAM_HIGH);
  camera.lookAt(player.x, player.y, 0);

  // ── Player mesh ──────────────────────────────────────────────
  playerBody.position.set(player.x, player.y, 0);
  facingDot.position.set(
    player.x + Math.cos(player.facing) * 0.55,
    player.y + Math.sin(player.facing) * 0.55,
    PLAYER_RADIUS * 2 + P_CYL_H + 0.1
  );

  updateHUD();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const a = innerWidth / innerHeight;
  camera.left   = -VIEW_HALF * a;
  camera.right  =  VIEW_HALF * a;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════════════════════
//  KICK OFF
// ═══════════════════════════════════════════════════════════════
updateHUD();
buildFlowField(player.x, player.y);
spawnWave(1);
requestAnimationFrame(loop);
</script>
</body>
</html>
